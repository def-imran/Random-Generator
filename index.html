<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Generator</title>
</head>
<body>
    <div class="main-container">
        <div class="text-info">
            <h1 class="titel">Generate a quote</h1>
            <p class="sub-titel">Push the button to generate a quote</p>
        </div>
        <div class="quote-visualizer">
            <p class="quote-text" id="quote-text">This is a quote.</p>
        </div>
        <div class="generate-quote">
            <button class="generate-button" id="generate-button">Generate Quote</button>
        </div>
    </div>
</body>
</html>
